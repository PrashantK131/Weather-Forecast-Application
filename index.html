<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> Weather Forecast System </title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,300&family=Space+Mono:wght@400;700&display=swap"
    rel="stylesheet" />

    <link href="./src/output.css" rel="stylesheet">
</head>
<body id="app-body">

    <!-- Rain Effect -->
    <div id="rain-container" class="fixed inset-0 pointer-events-none z-0 overflow-hidden hidden"></div>

    <!-- Toast or Popup Notifications -->
    <div id="toast-container" class="fixed top-4 right-4 z-50 flex flex-col gap-3 w-80 max-w-[calc(100vw-2rem)]"></div>

    <!-- Temperature Alert -->
    <div id="temp-alert" class="fixed top-0 left-0 right-0 z-40 hidden">
        <div class="bg-gradient-to-r from-red-600 via-orange-500 to-amber-500 text-white px-5 py-3 flex items-center justify-between shadow-xl">
            <div class="flex items-center gap-3">
                <span class="text-xl"> ⚠️ </span>
                <span id="temp-alert-msg" class="font-display font-semibold text-sm"></span>
            </div>
            <button onclick="document.getElementById('temp-alert').classList.add('hidden')" class="text-white/60 hover:text-white text-xl leading-none transition-colors ml-4"> × </button>
        </div>
    </div>

    <!-- Loading Overlay -->
    <div id="loading-overlay" class="fixed inset-0 z-50 flex items-center justify-center hidden" style="background:rgba(0,0,0,0.5);backdrop-filter:blur(6px)">
        <div class="flex flex-col items-center gap-4">
            <div class="spinner"></div>
            <p class="text-white font-display font-semibold animate-pulse">Fetching Weather…</p>
        </div>
    </div>

    <main class="flex-1 px-4 md:px-8 py-4 flex flex-col gap-5 pb-12">

      <div class="flex flex-col md:flex-row gap-4 items-start">

        <!-- ── SEARCH PANEL ─────────────────── -->
        <div class="glass w-full md:w-80 lg:w-96 flex-shrink-0 p-5 flex flex-col gap-4">

          <h2 class="font-display font-semibold text-white/80 text-xs uppercase tracking-widest"> Search Location </h2>

          <!-- City input + recent-searches dropdown -->
          <div class="relative">
            <input type="text" id="city-input" placeholder="e.g. New York, Tokyo, London…" class="w-full px-4 py-3 bg-white/10 border border-white/25 rounded-xl text-white placeholder-white/35 focus:outline-none focus:border-white/55 focus:ring-2 focus:ring-white/15 transition-all text-sm pr-8" autocomplete="off" />

             <!-- Shown only when input has a value (toggled via JS addclass/remove) -->
            <button id="clear-btn" onclick="clearSearch()" class="absolute right-3 top-1/2 -translate-y-1/2 text-white/35 hover:text-white/80 text-xl leading-none transition-colors hidden"> × </button>

            <!-- Recent searches dropdown -->
            <div id="recent-dropdown" class="absolute top-full left-0 right-0 mt-2 bg-slate-900/95 backdrop-blur-2xl border border-white/20 rounded-xl overflow-hidden z-30 hidden shadow-2xl">
              <div class="px-4 py-2 flex items-center justify-between border-b border-white/10">
                <span class="text-white/40 text-xs font-display uppercase tracking-widest"> Recent </span>
                <button onclick="clearRecentCities()" class="text-white/35 hover:text-red-400 text-xs transition-colors"> Clear all </button>
              </div>
              <ul id="recent-list" class="py-1 max-h-48 overflow-y-auto scroll-hide"></ul>
            </div>
          </div>

          <!-- Searching by using city name -->
          <button onclick="searchByCity()" class="w-full py-3 bg-white/15 hover:bg-white/25 active:scale-95 text-white font-display font-semibold rounded-xl border border-white/25 transition-all text-sm tracking-wide flex items-center justify-center gap-2">
            <span>🔍</span> Search </button>

          <div class="flex items-center gap-3">
            <div class="flex-1 h-px bg-white/15"></div>
            <span class="text-white/35 text-xs font-mono-custom">or</span>
            <div class="flex-1 h-px bg-white/15"></div>
          </div>

          <!-- Current Location -->
          <button id="location-btn" onclick="useCurrentLocation()" class="w-full py-3 bg-sky-500/25 hover:bg-sky-500/40 active:scale-95 text-sky-200 font-display font-semibold rounded-xl border border-sky-400/35 transition-all text-sm tracking-wide flex items-center justify-center gap-2">
            <span>📍</span> Use Current Location </button>

    </main>
    

    <script src="./src/script.js"></script>
</body>
</html>
