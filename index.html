<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> Weather Forecast System </title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,300&family=Space+Mono:wght@400;700&display=swap"
    rel="stylesheet" />

    <link href="./src/output.css" rel="stylesheet">
</head>
<body id="app-body">

    <!-- Rain Effect -->
    <div id="rain-container" class="fixed inset-0 pointer-events-none z-0 overflow-hidden hidden"></div>

    <!-- Toast or Popup Notifications -->
    <div id="toast-container" class="fixed top-4 right-4 z-50 flex flex-col gap-3 w-80 max-w-[calc(100vw-2rem)]"></div>

    <!-- Temperature Alert -->
    <div id="temp-alert" class="fixed top-0 left-0 right-0 z-40 hidden">
        <div class="bg-gradient-to-r from-red-600 via-orange-500 to-amber-500 text-white px-5 py-3 flex items-center justify-between shadow-xl">
            <div class="flex items-center gap-3">
                <span class="text-xl"> ⚠️ </span>
                <span id="temp-alert-msg" class="font-display font-semibold text-sm"></span>
            </div>
            <button onclick="document.getElementById('temp-alert').classList.add('hidden')" class="text-white/60 hover:text-white text-xl leading-none transition-colors ml-4"> × </button>
        </div>
    </div>

    <!-- Loading Overlay -->
    <div id="loading-overlay" class="fixed inset-0 z-50 flex items-center justify-center hidden" style="background:rgba(0,0,0,0.5);backdrop-filter:blur(6px)">
        <div class="flex flex-col items-center gap-4">
            <div class="spinner"></div>
            <p class="text-white font-display font-semibold animate-pulse">Fetching Weather…</p>
        </div>
    </div>

    

    <script src="./src/script.js"></script>
</body>
</html>
